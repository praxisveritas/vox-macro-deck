<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOX|Macro — Request Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-navy: hsl(210, 35%, 12%);
      --bg-card: hsl(207, 30%, 83%);
      --text-on-navy: hsl(207, 30%, 88%);
      --text-on-navy-muted: hsl(207, 22%, 60%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg-navy);
      color: var(--text-on-navy);
      font-family: 'Source Code Pro', monospace;
      overflow: hidden;
    }

    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 60px 40px;
    }

    .logo {
      font-size: 64px;
      font-weight: 200;
      letter-spacing: 0.2em;
    }
    .logo-pipe { color: var(--text-on-navy-muted); }

    .tagline {
      font-size: 22px;
      font-weight: 300;
      margin-top: 24px;
      text-align: center;
      line-height: 1.5;
    }

    .subtitle {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-on-navy-muted);
      margin-top: 16px;
      text-align: center;
      line-height: 1.7;
    }

    .cta-button {
      display: inline-block;
      background: var(--bg-card);
      color: var(--bg-navy);
      padding: 16px 52px;
      border-radius: 8px;
      font-family: 'Source Code Pro', monospace;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 40px;
      letter-spacing: 0.05em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(196, 211, 222, 0.2);
    }

    .footer {
      position: fixed;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 300;
      color: var(--text-on-navy-muted);
    }

    .footer a {
      color: var(--text-on-navy-muted);
      text-decoration: none;
      border-bottom: 1px solid hsl(210, 25%, 25%);
      padding-bottom: 2px;
      transition: color 0.2s ease;
    }
    .footer a:hover {
      color: var(--text-on-navy);
    }

    /* Responsive */
    @media screen and (max-width: 600px) {
      .logo { font-size: 36px; }
      .tagline { font-size: 18px; }
      .slide { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="logo">VOX<span class="logo-pipe">|</span>Macro</div>
    <p class="tagline">Where serious investors find signal.</p>
    <p class="subtitle">
      Send us a request and we'll get you set up.
    </p>
    <a href="mailto:voxmacro@praxisveritas.io?subject=I'd%20like%20to%20join%20Vox%20Macro" class="cta-button">Request Access</a>
  </div>
  <div class="footer">
    <a href="https://praxisveritas.github.io/vox-macro-deck/">View full product deck &rarr;</a>
  </div>
</body>
</html>
